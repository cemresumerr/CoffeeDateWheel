<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coffee Date Wheel ☕❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1a1118;
            --card: #2a1f25;
            --accent: #c9a87c;
            --accent-glow: #e8c99b;
            --rose: #b5485e;
            --rose-light: #d4748a;
            --cream: #f5ede3;
            --cream-soft: #e8ddd0;
            --text: #f5ede3;
            --text-muted: #a89999;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            font-size: 1.4rem;
            opacity: 0;
            animation: floatUp 8s ease-in infinite;
        }

        @keyframes floatUp {
            0% {
                opacity: 0;
                transform: translateY(100vh) rotate(0deg);
            }

            10% {
                opacity: 0.6;
            }

            90% {
                opacity: 0.6;
            }

            100% {
                opacity: 0;
                transform: translateY(-10vh) rotate(360deg);
            }
        }

        .ambient {
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.15;
            pointer-events: none;
            z-index: 0;
        }

        .ambient-1 {
            background: var(--rose);
            top: -100px;
            right: -100px;
        }

        .ambient-2 {
            background: var(--accent);
            bottom: -150px;
            left: -100px;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 560px;
            margin: 0 auto;
            padding: 40px 20px 60px;
        }

        .header {
            text-align: center;
            margin-bottom: 36px;
            animation: fadeDown 1s ease-out;
        }

        @keyframes fadeDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header .logo {
            font-size: 3rem;
            margin-bottom: 8px;
            display: inline-block;
            animation: steam 3s ease-in-out infinite;
        }

        @keyframes steam {
            0%, 100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-6px);
            }
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--cream);
        }

            .header h1 span {
                color: var(--rose-light);
            }

        .header p {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-top: 8px;
            font-style: italic;
        }

        /* Progress */
        .progress-bar {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-bottom: 24px;
            align-items: center;
        }

        .progress-step {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .progress-dot {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--card);
            border: 2px solid rgba(201,168,124,0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            transition: all 0.4s;
        }

        .progress-step.active .progress-dot {
            border-color: var(--accent);
            background: rgba(201,168,124,0.15);
            box-shadow: 0 0 16px rgba(201,168,124,0.3);
            transform: scale(1.15);
        }

        .progress-step.done .progress-dot {
            border-color: var(--rose);
            background: var(--rose);
        }

        .progress-line {
            width: 24px;
            height: 2px;
            background: rgba(201,168,124,0.15);
            transition: background 0.3s;
        }

        .progress-step.done .progress-line {
            background: var(--rose);
        }

        /* Wheel */
        .wheel-stage-label {
            text-align: center;
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            color: var(--accent-glow);
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .wheel-container {
            position: relative;
            width: 340px;
            height: 340px;
            margin: 0 auto 28px;
        }

        #wheelCanvas {
            width: 340px;
            height: 340px;
            border-radius: 50%;
            box-shadow: 0 0 0 8px var(--card), 0 0 0 10px rgba(201,168,124,0.2), 0 0 60px rgba(181,72,94,0.2);
            transition: filter 0.3s;
        }

            #wheelCanvas.dimmed {
                filter: brightness(0.5);
            }

        .pointer {
            position: absolute;
            top: -18px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            width: 0;
            height: 0;
            border-left: 14px solid transparent;
            border-right: 14px solid transparent;
            border-top: 32px solid var(--accent-glow);
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
        }

            .pointer::after {
                content: '';
                position: absolute;
                top: -36px;
                left: 50%;
                transform: translateX(-50%);
                width: 10px;
                height: 10px;
                background: var(--accent-glow);
                border-radius: 50%;
            }

        .wheel-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 58px;
            height: 58px;
            background: radial-gradient(circle, var(--card) 60%, #1a1118);
            border-radius: 50%;
            border: 3px solid rgba(201,168,124,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            z-index: 5;
            pointer-events: none;
        }

        /* Spin */
        .spin-section {
            text-align: center;
            margin-bottom: 28px;
        }

        .spin-btn {
            background: linear-gradient(135deg, var(--rose), #6f4e37);
            color: var(--cream);
            border: none;
            padding: 16px 48px;
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            border-radius: 60px;
            cursor: pointer;
            letter-spacing: 2px;
            transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
            box-shadow: 0 8px 32px rgba(181,72,94,0.35);
            position: relative;
            overflow: hidden;
        }

            .spin-btn::before {
                content: '';
                position: absolute;
                top: 0;
                left: -100%;
                width: 100%;
                height: 100%;
                background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
                transition: left 0.6s;
            }

            .spin-btn:hover::before {
                left: 100%;
            }

            .spin-btn:hover {
                transform: scale(1.08);
                box-shadow: 0 12px 48px rgba(181,72,94,0.5);
            }

            .spin-btn:active {
                transform: scale(0.96);
            }

            .spin-btn:disabled {
                opacity: 0.6;
                pointer-events: none;
            }

        /* Results */
        .results {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 12px;
        }

        .result-card {
            background: var(--card);
            border: 1px solid rgba(201,168,124,0.12);
            border-radius: 16px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            opacity: 0;
            transform: translateY(16px);
            transition: all 0.5s cubic-bezier(0.34,1.56,0.64,1);
        }

            .result-card.show {
                opacity: 1;
                transform: translateY(0);
            }

        .card-icon {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

            .card-icon.c0 {
                background: linear-gradient(135deg, #3d2b1f, #6f4e37);
            }

            .card-icon.c1 {
                background: linear-gradient(135deg, #1a3a2a, #2d6a4f);
            }

            .card-icon.c2 {
                background: linear-gradient(135deg, #2a1a3a, #5a3d7a);
            }

            .card-icon.c3 {
                background: linear-gradient(135deg, #3a1a2a, #7a3d5a);
            }

        .card-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--text-muted);
            margin-bottom: 2px;
        }

        .card-value {
            font-family: 'Playfair Display', serif;
            font-size: 1.05rem;
            color: var(--cream);
            font-weight: 600;
        }

        /* Love Message */
        .love-message {
            display: none;
            text-align: center;
            margin-top: 24px;
            padding: 24px;
            background: linear-gradient(135deg, rgba(181,72,94,0.15), rgba(201,168,124,0.1));
            border: 1px solid rgba(181,72,94,0.25);
            border-radius: 22px;
        }

            .love-message.show {
                display: block;
                animation: fadeUp 0.6s ease-out;
            }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .love-message .heart {
            font-size: 2rem;
            display: inline-block;
            animation: heartbeat 1.2s ease-in-out infinite;
        }

        @keyframes heartbeat {
            0%, 100% {
                transform: scale(1);
            }

            15% {
                transform: scale(1.25);
            }

            30% {
                transform: scale(1);
            }

            45% {
                transform: scale(1.15);
            }
        }

        .love-message .msg-text {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.15rem;
            color: var(--accent-glow);
            margin-top: 8px;
        }

        .reset-section {
            text-align: center;
            margin-top: 20px;
            display: none;
        }

            .reset-section.show {
                display: block;
            }

        .reset-btn {
            background: transparent;
            border: 1px solid rgba(201,168,124,0.25);
            color: var(--text-muted);
            padding: 10px 28px;
            border-radius: 30px;
            cursor: pointer;
            font-family: 'Nunito', sans-serif;
            font-size: 0.85rem;
            transition: all 0.3s;
        }

            .reset-btn:hover {
                border-color: var(--accent);
                color: var(--cream);
            }

        .footer {
            text-align: center;
            margin-top: 48px;
            font-size: 0.75rem;
            color: rgba(168,153,153,0.5);
        }

            .footer a {
                color: var(--rose-light);
                text-decoration: none;
            }

        @media (max-width: 420px) {
            .wheel-container, #wheelCanvas {
                width: 290px;
                height: 290px;
            }

            .header h1 {
                font-size: 1.7rem;
            }

            .spin-btn {
                padding: 14px 36px;
                font-size: 1.05rem;
            }
        }
    </style>
</head>
<body>

    <div class="particles" id="particles"></div>
    <div class="ambient ambient-1"></div>
    <div class="ambient ambient-2"></div>

    <div class="container">
        <div class="header">
            <div class="logo">☕</div>
            <h1>Coffee Date <span>Wheel</span></h1>
            <p>Çarkı çevir, bugünün planını keşfet</p>
        </div>

        <div class="progress-bar">
            <div class="progress-step active" id="step-0"><div class="progress-dot">☕</div></div>
            <div class="progress-step" id="step-1"><div class="progress-line"></div><div class="progress-dot">📍</div></div>
            <div class="progress-step" id="step-2"><div class="progress-line"></div><div class="progress-dot">🎯</div></div>
            <div class="progress-step" id="step-3"><div class="progress-line"></div><div class="progress-dot">💫</div></div>
        </div>

        <div class="wheel-stage-label" id="stageLabel">☕ Kahve Seç</div>

        <div class="wheel-container">
            <div class="pointer"></div>
            <canvas id="wheelCanvas" width="680" height="680"></canvas>
            <div class="wheel-center" id="wheelCenterIcon">☕</div>
        </div>

        <div class="spin-section">
            <button class="spin-btn" id="spinBtn" onclick="spinWheel()">✨ Çarkı Çevir</button>
        </div>

        <div class="results" id="results">
            <div class="result-card" id="card-0">
                <div class="card-icon c0">☕</div>
                <div><div class="card-label">Kahve</div><div class="card-value" id="val-0">—</div></div>
            </div>
            <div class="result-card" id="card-1">
                <div class="card-icon c1">📍</div>
                <div><div class="card-label">Mekan</div><div class="card-value" id="val-1">—</div></div>
            </div>
            <div class="result-card" id="card-2">
                <div class="card-icon c2">🎯</div>
                <div><div class="card-label">Aktivite</div><div class="card-value" id="val-2">—</div></div>
            </div>
            <div class="result-card" id="card-3">
                <div class="card-icon c3">💫</div>
                <div><div class="card-label">Mod</div><div class="card-value" id="val-3">—</div></div>
            </div>
        </div>

        <div class="love-message" id="loveMsg">
            <div class="heart">❤️</div>
            <div class="msg-text" id="loveMsgText"></div>
        </div>

        <div class="reset-section" id="resetSection">
            <button class="reset-btn" onclick="resetAll()">🔄 Baştan Başla</button>
        </div>

        <div class="footer">made with ❤️ for us</div>
    </div>

    <script>
        const wheelData = [
            {
                label: 'Kahve Seç', icon: '☕',
                items: ['Latte', 'Cappuccino', 'Mocha', 'Türk Kahvesi', 'Flat White', 'Americano', 'Macchiato', 'Iced Coffee'],
                colors: ['#6f4e37', '#8b6914', '#a0785a', '#b58d6e', '#c9a87c', '#8b5e3c', '#7a5234', '#9e7653']
            },
            {
                label: 'Mekan Seç', icon: '📍',
                items: ['Deniz kenarı', 'Rooftop', 'Kitapçı kafe', 'Park bahçesi', 'Retro kafe', 'Gizli bahçe', 'Galeri kafe', 'Boğaz kenarı'],
                colors: ['#2d6a4f', '#40916c', '#52b788', '#3a7d5e', '#1b4332', '#2d6a4f', '#358a62', '#4c9c70']
            },
            {
                label: 'Aktivite Seç', icon: '🎯',
                items: ['Mektup yaz', 'Kahve falı', 'Playlist yap', '20 Soru', 'Çizim yap', 'Fotoğraf', 'Kitap öner', 'Hayal kur'],
                colors: ['#5a3d7a', '#7251a1', '#8b6ec1', '#6a4d8a', '#4a2d6a', '#5f4285', '#7d5fb5', '#9476c7']
            },
            {
                label: 'Mod Seç', icon: '💫',
                items: ['Romantik 💕', 'Eğlenceli 🎉', 'Huzurlu 🕊️', 'Maceracı 🗺️', 'Nostaljik 📼', 'Yaratıcı 🎭'],
                colors: ['#b5485e', '#d4748a', '#8b3a4a', '#c45b72', '#9e3f55', '#d98da0']
            }
        ];

        const loveMessages = [
            "Seninle her an güzel ❤️",
            "Bu kahve senin kadar tatlı olamaz 🥰",
            "Bugün sadece biz varız 💫",
            "En güzel anılar seninle 🌹",
            "Her yudum seninle daha güzel ☕❤️",
            "Dünya dursa bile kahvemiz soğumasın 😊"
        ];

        let currentStep = 0;
        let isSpinning = false;
        let currentAngle = 0;

        // Particles
        const emojiSet = ['☕', '❤️', '✨', '🌹', '💫', '🤎', '💕'];
        const pCont = document.getElementById('particles');
        for (let i = 0; i < 12; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.textContent = emojiSet[Math.floor(Math.random() * emojiSet.length)];
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDelay = Math.random() * 8 + 's';
            p.style.animationDuration = (6 + Math.random() * 5) + 's';
            pCont.appendChild(p);
        }

        // Canvas
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const W = canvas.width;
        const cx = W / 2, cy = W / 2, R = W / 2 - 20;

        function drawWheel(idx, angle) {
            const d = wheelData[idx];
            const n = d.items.length;
            const slice = (2 * Math.PI) / n;

            ctx.clearRect(0, 0, W, W);
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(angle);

            for (let i = 0; i < n; i++) {
                const a0 = i * slice;
                const a1 = a0 + slice;

                // Draw slice
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.arc(0, 0, R, a0, a1);
                ctx.closePath();
                ctx.fillStyle = d.colors[i % d.colors.length];
                ctx.fill();
                ctx.strokeStyle = 'rgba(0,0,0,0.25)';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Subtle inner gradient
                const grad = ctx.createRadialGradient(0, 0, R * 0.3, 0, 0, R);
                grad.addColorStop(0, 'rgba(255,255,255,0.08)');
                grad.addColorStop(1, 'rgba(0,0,0,0.15)');
                ctx.fillStyle = grad;
                ctx.fill();

                // Text
                ctx.save();
                ctx.rotate(a0 + slice / 2);
                ctx.textAlign = 'right';
                ctx.fillStyle = '#f5ede3';
                ctx.font = `bold ${n <= 6 ? 24 : 20}px Nunito, sans-serif`;
                ctx.shadowColor = 'rgba(0,0,0,0.6)';
                ctx.shadowBlur = 4;
                ctx.fillText(d.items[i], R - 24, 6);
                ctx.shadowBlur = 0;
                ctx.restore();
            }
            ctx.restore();

            // Outer ring glow
            ctx.beginPath();
            ctx.arc(cx, cy, R + 6, 0, 2 * Math.PI);
            ctx.strokeStyle = 'rgba(201,168,124,0.25)';
            ctx.lineWidth = 3;
            ctx.stroke();
        }

        drawWheel(0, 0);

        // Spin
        function spinWheel() {
            if (isSpinning || currentStep >= wheelData.length) return;
            isSpinning = true;

            const btn = document.getElementById('spinBtn');
            btn.disabled = true;
            btn.textContent = '🎰 Dönüyor...';

            const d = wheelData[currentStep];
            const n = d.items.length;
            const slice = (2 * Math.PI) / n;

            const chosen = Math.floor(Math.random() * n);
            const targetCenter = chosen * slice + slice / 2;
            const targetAngle = -targetCenter - Math.PI / 2;
            const spins = 5 + Math.floor(Math.random() * 4);
            const totalRot = spins * 2 * Math.PI + (targetAngle - (currentAngle % (2 * Math.PI)));

            const startA = currentAngle;
            const endA = startA + totalRot;
            const dur = 4000 + Math.random() * 1500;
            const t0 = performance.now();

            function ease(t) { return 1 - Math.pow(1 - t, 4); }

            function tick(now) {
                const p = Math.min((now - t0) / dur, 1);
                currentAngle = startA + totalRot * ease(p);
                drawWheel(currentStep, currentAngle);
                if (p < 1) {
                    requestAnimationFrame(tick);
                } else {
                    currentAngle = endA;
                    onDone(d.items[chosen]);
                }
            }
            requestAnimationFrame(tick);
        }

        function onDone(item) {
            // Show card
            document.getElementById(`val-${currentStep}`).textContent = item;
            document.getElementById(`card-${currentStep}`).classList.add('show');

            // Update progress
            document.getElementById(`step-${currentStep}`).classList.remove('active');
            document.getElementById(`step-${currentStep}`).classList.add('done');

            currentStep++;
            isSpinning = false;
            const btn = document.getElementById('spinBtn');

            if (currentStep < wheelData.length) {
                document.getElementById(`step-${currentStep}`).classList.add('active');
                document.getElementById('wheelCenterIcon').textContent = wheelData[currentStep].icon;
                document.getElementById('stageLabel').textContent = wheelData[currentStep].icon + ' ' + wheelData[currentStep].label;
                currentAngle = 0;
                drawWheel(currentStep, 0);
                btn.disabled = false;
                btn.textContent = '✨ Çarkı Çevir';
            } else {
                btn.disabled = true;
                btn.textContent = '🎉 Plan Hazır!';
                canvas.classList.add('dimmed');
                document.getElementById('stageLabel').textContent = '✅ Harika bir plan oluştu!';

                setTimeout(() => {
                    const msg = loveMessages[Math.floor(Math.random() * loveMessages.length)];
                    document.getElementById('loveMsgText').textContent = msg;
                    document.getElementById('loveMsg').classList.add('show');
                    document.getElementById('resetSection').classList.add('show');
                }, 400);
            }
        }

        function resetAll() {
            currentStep = 0;
            currentAngle = 0;
            isSpinning = false;

            document.querySelectorAll('.result-card').forEach(c => c.classList.remove('show'));
            document.querySelectorAll('.card-value').forEach(v => v.textContent = '—');
            document.querySelectorAll('.progress-step').forEach((s, i) => {
                s.classList.remove('done', 'active');
                if (i === 0) s.classList.add('active');
            });

            document.getElementById('wheelCenterIcon').textContent = '☕';
            document.getElementById('stageLabel').textContent = '☕ Kahve Seç';
            document.getElementById('loveMsg').classList.remove('show');
            document.getElementById('resetSection').classList.remove('show');
            canvas.classList.remove('dimmed');

            const btn = document.getElementById('spinBtn');
            btn.disabled = false;
            btn.textContent = '✨ Çarkı Çevir';

            drawWheel(0, 0);
        }
    </script>

</body>
</html>
